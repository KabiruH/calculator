<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

     <header role="banner">
        <div class="header__inner">
            <h1 class="header__title">Calculator</h1>
            <span class="header__sub">Simple & Precise</span>
        </div>
    </header>

     <main>
        <div class="calculator" role="application" aria-label="Calculator">

            <!-- DISPLAY -->
            <div class="display">
                <span
                    class="display__expression"
                    id="expression"
                    aria-hidden="true"
                ></span>
                <span
                    class="display__current"
                    id="current"
                    role="status"
                    aria-live="polite"
                    aria-label="Current value: 0"
                    aria-atomic="true"
                >0</span>
            </div>

            <!-- BUTTON GRID -->
            <div class="buttons" role="group" aria-label="Calculator buttons">

                <!-- Row 1 -->
                <button class="btn btn--clear" id="clear" aria-label="Clear all">AC</button>
                <button class="btn btn--backspace" id="backspace" aria-label="Backspace, delete last digit">&#x232B;</button>
                <button class="btn btn--operator" data-operator="/" aria-label="Divide">÷</button>
                <button class="btn btn--operator" data-operator="*" aria-label="Multiply">×</button>

                <!-- Row 2 -->
                <button class="btn btn--digit" data-digit="7" aria-label="7">7</button>
                <button class="btn btn--digit" data-digit="8" aria-label="8">8</button>
                <button class="btn btn--digit" data-digit="9" aria-label="9">9</button>
                <button class="btn btn--operator" data-operator="-" aria-label="Subtract">−</button>

                <!-- Row 3 -->
                <button class="btn btn--digit" data-digit="4" aria-label="4">4</button>
                <button class="btn btn--digit" data-digit="5" aria-label="5">5</button>
                <button class="btn btn--digit" data-digit="6" aria-label="6">6</button>
                <button class="btn btn--operator" data-operator="+" aria-label="Add">+</button>

                <!-- Row 4 -->
                <button class="btn btn--digit" data-digit="1" aria-label="1">1</button>
                <button class="btn btn--digit" data-digit="2" aria-label="2">2</button>
                <button class="btn btn--digit" data-digit="3" aria-label="3">3</button>
                <button class="btn btn--equals" id="equals" aria-label="Equals, calculate result">=</button>

                <!-- Row 5 -->
                <button class="btn btn--digit btn--zero" data-digit="0" aria-label="0">0</button>
                <button class="btn btn--digit" id="decimal" data-digit="." aria-label="Decimal point">.</button>

            </div>
        </div>
    </main>

     <footer role="contentinfo">
        <div class="footer__inner">
            <span class="footer__text">Built with JavaScript · HTML · CSS</span>
            <span class="footer__copy">© 2025 Calculator App</span>
        </div>
    </footer>
    
    <script src="./script.js"></script>
</body>
</html>
